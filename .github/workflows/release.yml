name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - "metadata.yaml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from metadata.yaml
        id: get_version
        run: |
          VERSION=$(grep -E '^version:' metadata.yaml | sed 's/version: *//' | sed 's/ *#.*//' | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.get_version.outputs.version }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.get_version.outputs.version }} does not exist"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release notes
        if: steps.check_release.outputs.exists == 'false'
        id: get_notes
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          printf "%s" "$VERSION" > .version.tmp

          python3 <<'PY' > release_notes.txt
          import re
          from pathlib import Path

          version = Path(".version.tmp").read_text(encoding="utf-8").strip()
          changelog = Path("CHANGELOG.md")
          metadata = Path("metadata.yaml")

          fallback = f"Release {version}"
          if metadata.exists():
              for line in metadata.read_text(encoding="utf-8").splitlines():
                  if line.startswith("desc:"):
                      desc = line.split(":", 1)[1].strip()
                      if desc:
                          fallback = f"{fallback}\n\n{desc}"
                      break

          if not changelog.exists():
              print(fallback)
              raise SystemExit(0)

          content = changelog.read_text(encoding="utf-8")
          pattern = rf"## \[{re.escape(version)}\](?:\s*-\s*\d{{4}}-\d{{2}}-\d{{2}})?\s*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print(fallback)
              raise SystemExit(0)

          notes = match.group(1).strip()
          print(notes or fallback)
          PY

          {
            echo "notes<<EOF"
            cat release_notes.txt
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: ${{ steps.get_notes.outputs.notes }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
